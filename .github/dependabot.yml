version: 2
updates:
  # npm dependencies (astro, @astrojs/*, biome, vitest, …)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      # one PR for routine minor/patch bumps instead of many
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # the GitHub Actions used in deploy.yml
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
