name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # monthly rebuild so security.txt's rolling Expires never lapses without a commit
  schedule:
    - cron: "0 6 1 * *"

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, don't cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22 # Astro 7 requires Node >=22.12
          cache: npm
      - run: npm ci
      - run: npm run check # astro check + biome + vitest — block deploy on a red gate
      - run: npm run build
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: dist
          # default excludes dotfiles → drops .well-known/ and .nojekyll from the deploy
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
